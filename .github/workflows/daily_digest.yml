# Editorial topic briefs + whale alerts.
name: Polymarket editorial bot

on:
  schedule:
    - cron: "0 8 * * *"   # politics
    - cron: "0 10 * * *"  # economy
    - cron: "0 12 * * *"  # sports
    - cron: "0 14 * * *"  # other
    - cron: "*/30 * * * *"  # whale check every 30 min
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set run mode from UTC hour
        id: mode
        run: |
          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)
          if [ "$MINUTE" = "00" ] && [ "$HOUR" = "08" ]; then
            echo "bot_mode=topic" >> $GITHUB_OUTPUT
            echo "topic=politics" >> $GITHUB_OUTPUT
          elif [ "$MINUTE" = "00" ] && [ "$HOUR" = "10" ]; then
            echo "bot_mode=topic" >> $GITHUB_OUTPUT
            echo "topic=economy" >> $GITHUB_OUTPUT
          elif [ "$MINUTE" = "00" ] && [ "$HOUR" = "12" ]; then
            echo "bot_mode=topic" >> $GITHUB_OUTPUT
            echo "topic=sports" >> $GITHUB_OUTPUT
          elif [ "$MINUTE" = "00" ] && [ "$HOUR" = "14" ]; then
            echo "bot_mode=topic" >> $GITHUB_OUTPUT
            echo "topic=other" >> $GITHUB_OUTPUT
          else
            echo "bot_mode=whale" >> $GITHUB_OUTPUT
            echo "topic=other" >> $GITHUB_OUTPUT
          fi

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_MODE: ${{ steps.mode.outputs.bot_mode }}
          TOPIC: ${{ steps.mode.outputs.topic }}
        run: python main.py

      - name: Persist whale alert state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whale_alerts.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No whale state changes"
          else
            git commit -m "chore: persist whale alerts state"
            git push
          fi
